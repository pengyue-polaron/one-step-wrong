name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  browser:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  container:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - run: docker build --tag one-step-wrong:ci .
      - run: docker run --detach --name one-step-wrong --publish 3000:3000 one-step-wrong:ci
      - name: Wait for the application
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:3000/ > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          docker logs one-step-wrong
          exit 1
      - name: Verify production routes and runtime user
        run: |
          test "$(docker exec one-step-wrong id -u)" = "1001"
          curl --fail --silent http://127.0.0.1:3000/studio > /dev/null
          curl --fail --silent \
            --header 'content-type: application/json' \
            --data '{"institutionName":"New York University","officialDomains":["nyu.edu"],"useFixture":true}' \
            http://127.0.0.1:3000/api/institutions/research \
            | jq --exit-status '.provenance == "reviewed-fixture"'
      - name: Stop the application
        if: always()
        run: docker rm --force one-step-wrong
